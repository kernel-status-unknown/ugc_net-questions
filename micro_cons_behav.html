<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Platform</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        #quiz-container { background: white; width: 100%; max-width: 600px; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
        .options { display: grid; gap: 10px; }
        button.option-btn { 
            padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; 
            cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem;
        }
        button.option-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        button.option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        button.option-btn.wrong { background: var(--error); color: white; border-color: var(--error); }
        #score-screen { text-align: center; display: none; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="quiz-screen">
        <div class="question" id="question-text">Loading question...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="score-screen">
        <h2>Quiz Complete! 🎉</h2>
        <p style="font-size: 1.5rem;">You scored: <span id="final-score">0</span> / <span id="total-questions">0</span></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">Restart Quiz</button>
    </div>
</div>

        {
            question: "What is the capital of France?",
            options: ["Berlin", "Madrid", "Paris", "Rome"],

            question: "Which planet is known as the Red Planet?",
            options: ["Venus", "Mars", "Jupiter", "Saturn"],
            correct: 1
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const q = quizData[currentIdx];
        document.getElementById("question-text").innerText = q.question;
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        
        // Update Progress
        document.getElementById("progress-fill").style.width = `${(currentIdx / quizData.length) * 100}%`;

        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const correct = quizData[currentIdx].correct;
        const allBtns = document.querySelectorAll(".option-btn");
        
        allBtns.forEach(b => b.disabled = true); // Prevent double clicking

        if(selected === correct) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
            allBtns[correct].classList.add("correct");
        }

        setTimeout(() => {
            currentIdx++;
            if(currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1200);
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("score-screen").style.display = "block";
        document.getElementById("progress-fill").style.width = "100%";
        document.getElementById("final-score").innerText = score;
        document.getElementById("total-questions").innerText = quizData.length;
    }
